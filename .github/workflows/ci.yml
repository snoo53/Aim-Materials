name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax check
        run: python -m compileall -q .

      - name: Shell syntax check
        run: |
          shopt -s nullglob
          for f in qe_campaign_v1_local/*.sh; do
            bash -n "$f"
          done

